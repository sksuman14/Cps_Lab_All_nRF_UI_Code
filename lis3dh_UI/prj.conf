# ==========================================
# Core System & Console
# ==========================================
CONFIG_PRINTK=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_REBOOT=y


# ==========================================
# UI Module (UART) Requirements
# ==========================================
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y

# ==========================================
# C Library & Floating Point Support (CRITICAL)
# ==========================================
# Required for fflush(), atoi(), strstr(), and printf floats (%.3f)
CONFIG_NEWLIB_LIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# ==========================================
# Sensor Framework & Hardware
# ==========================================
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_GPIO=y

# Zephyr uses this single driver for both the LIS2DH and LIS3DH
CONFIG_LIS2DH=y