# --- Core Console & System ---
CONFIG_PRINTK=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_REBOOT=y

# --- UI Module (UART) ---
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y

# --- Hardware & Sensor Framework ---
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_VL53L0X=y

# --- Floating Point for printk ---
CONFIG_CBPRINTF_FP_SUPPORT=y